                                                    - heading [level=2]: Relaxing resource limits in Colab Pro
                                                  - paragraph: Your resources are not unlimited in Colab. To make the most of Colab, avoid using resources when you don't need them. For example, only use a GPU when required and close Colab tabs when finished.
                                                  - paragraph:
                                                    - text: If you encounter limitations, you can relax those limitations by purchasing more compute units via pay as you go. Anyone can purchase compute units via
