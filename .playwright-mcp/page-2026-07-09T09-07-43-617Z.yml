                                                    - text: Users who have purchased one of Colab's paid plans have access to high-memory VMs when they are available. More powerful GPUs are always offered with high-memory VMs. You can see how much memory you have available at any time by running the following code cell. If the execution result of running the code cell below is 'Not using a high-RAM runtime', then you can enable a high-RAM runtime via
                                                    - code: Runtime > Change runtime type
                                                    - text: in the menu. Then select High-RAM in the Runtime shape toggle button. After, re-execute the code cell.
