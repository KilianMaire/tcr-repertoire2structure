                                                    - heading [level=2]: Longer runtimes
                                                  - paragraph: All Colab runtimes are reset after some period of time (which is faster if the runtime isn't executing code). Colab Pro and Pro+ users have access to longer runtimes than those who use Colab free of charge.
                                                  - heading [level=2]: Background execution
                                                  - paragraph: Colab Pro+ users have access to background execution, where notebooks will continue executing even after you've closed a browser tab. This is always enabled in Pro+ runtimes as long as you have compute units available.
