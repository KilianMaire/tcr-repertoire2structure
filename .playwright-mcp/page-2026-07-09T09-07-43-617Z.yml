                                                    - heading [level=2]: Faster GPUs
                                                  - paragraph:
                                                    - text: Users who have purchased one of Colab's paid plans have access to faster GPUs and more memory. You can upgrade your notebook's GPU settings in
                                                    - code: Runtime > Change runtime type
                                                    - text: in the menu to select from several accelerator options, subject to availability.
                                                  - paragraph: The free-of-charge version of Colab grants access to Nvidia's T4 GPUs subject to quota restrictions and availability.
                                                  - paragraph:
                                                    - text: You can see what GPU you've been assigned at any time by executing the following cell. If the execution result of running the code cell below is 'Not connected to a GPU', you can change the runtime by going to
                                                    - code: Runtime > Change runtime type
                                                    - text: in the menu to enable a GPU accelerator, and then re-execute the code cell.
